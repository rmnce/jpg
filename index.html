<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        /* Flexbox centers the container vertically and horizontally */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .container {
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 15px; /* Spacing between buttons */
            justify-content: center;
        }

        /* Styling the anchor tags to look like buttons */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 16px;
            text-decoration: none;
            color: white;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }

        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; }

        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        <div class="button-group">
            <!-- Internal links point to other .html files in your directory -->
            <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
            <a href="profile.html" class="btn btn-secondary">View Profile</a>
        </div>
    </div>

</body>
</html>

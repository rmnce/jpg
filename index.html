<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jpg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #c0622a;
      --orange-light: #d4763a;
      --orange-glow: rgba(192, 98, 42, 0.35);
      --black: #080808;
      --card-bg: rgba(14, 13, 13, 0.82);
      --card-border: rgba(255,255,255,0.06);
      --text-dim: rgba(200, 170, 150, 0.55);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      color: #fff;
    }

    /* ── BACKGROUND IMAGE ── */
    .bg {
      position: fixed; inset: 0;
      z-index: 0;
      overflow: hidden;
      background: url('bck.png') center/cover no-repeat;
    }

    /* Dark overlay so card stays readable */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    /* ── LAYOUT ── */
    .stage {
      position: relative;
      z-index: 10;
      width: 100%; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      width: min(420px, 90vw);
      padding: 48px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      backdrop-filter: blur(22px) saturate(0.6);
      -webkit-backdrop-filter: blur(22px) saturate(0.6);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 30px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(192,98,42,0.08);
      animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      position: relative;
      width: 84px; height: 84px;
      margin-bottom: 18px;
      animation: cardIn 1s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--orange), transparent 60%, var(--orange-light));
      opacity: 0.7;
      animation: spin 6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar {
      position: relative;
      z-index: 1;
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #1a1a1a;
      border: 2px solid var(--black);
      /* placeholder silhouette */
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .avatar-placeholder {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #1c1c1c 0%, #2a2a2a 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      color: var(--orange);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
    }

    /* ── NAME ── */
    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.55rem;
      letter-spacing: 0.04em;
      color: var(--orange-light);
      margin-bottom: 6px;
      animation: cardIn 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── BIO / LOCATION ── */
    .bio-text {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: lowercase;
      margin-bottom: 18px;
      animation: cardIn 1s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--orange);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      animation: cardIn 1s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }

    .location svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--card-border), transparent);
      margin: 20px 0;
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 13px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      color: rgba(220,200,185,0.75);
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: cardIn 1s both;
    }

    .link-btn:nth-child(1) { animation-delay: 0.3s; }
    .link-btn:nth-child(2) { animation-delay: 0.37s; }
    .link-btn:nth-child(3) { animation-delay: 0.44s; }
    .link-btn:nth-child(4) { animation-delay: 0.51s; }
    .link-btn:nth-child(5) { animation-delay: 0.58s; }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--orange-glow), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-btn:hover {
      background: rgba(192,98,42,0.1);
      border-color: rgba(192,98,42,0.35);
      color: #fff;
      transform: translateX(3px);
    }

    .link-btn:hover::after { opacity: 1; }

    .link-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: rgba(192,98,42,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .link-icon svg { width: 15px; height: 15px; }

    .link-label {
      position: relative; z-index: 1;
      flex: 1;
    }

    .link-arrow {
      position: relative; z-index: 1;
      opacity: 0.3;
      font-size: 0.65rem;
      transition: opacity 0.2s;
    }

    .link-btn:hover .link-arrow { opacity: 0.7; }

    /* ── GLOBE ICON (standalone) ── */
    .globe-row {
      margin-top: 14px;
      animation: cardIn 1s 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    .globe-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--orange);
      opacity: 0.8;
      transition: opacity 0.2s, transform 0.2s;
      display: flex; align-items: center; justify-content: center;
    }

    .globe-btn:hover { opacity: 1; transform: scale(1.15) rotate(15deg); }
    .globe-btn svg { width: 22px; height: 22px; }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 18px; right: 22px;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.1em;
      z-index: 20;
    }

    /* scrollbar hidden */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg"></div>

<!-- Card -->
<div class="stage">
  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar">
        <img src="oxy.png" alt="jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />
      </div>
    </div>

    <!-- Name -->
    <div class="name">jpg</div>

    <!-- Bio -->
    <div class="bio-text">arizona iced out boys</div>

    <!-- Globe -->

  </div>
</div>

</body>
</html>

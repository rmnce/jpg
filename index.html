<!DOCTYPE html>
<html lang="en">
<head>
    <link type="image/png" sizes="32x32" rel="icon" href="https://img.icons8.com/hatch/64/star.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>manipulators</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* City Skyline Background */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://r2.fakecrime.bio/uploads/6f75749f-577b-492d-94f1-e3f51c886d80.png');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 3rem;
            /* Dark Glass Effect (Black/Grey tint) */
            background: rgba(20, 20, 20, 0.6); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            /* Sharp Dark Borders */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            font-weight: 200;
            letter-spacing: 4px;
            font-size: 2.2rem;
            text-transform: uppercase;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 2rem;
        }

        /* Grey Glass Buttons */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 13px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            border-radius: 4px; /* Squarer for a more industrial look */
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Subtle grey highlight for primary */
        .btn-primary {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>priv only</h1>
        <div class="button-group">
            <a href="jpg" class="btn btn-primary">jpg</a>
            <a href="$" class="btn">fern</a>
        </div>
    </div>

</body>
</html>
